name: Publish

# Manually triggered from the Actions tab. Pick the version bump and it bumps
# package.json, commits + tags, pushes, then publishes to npm.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write # push the version commit + tag
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # BUMP comes from the constrained choice input, passed via env (not a ${{ }}
      # expansion inside the script) so there's no command-injection surface.
      - name: Bump version
        env:
          BUMP: ${{ inputs.version }}
        run: |
          npm version "$BUMP" -m "chore: release v%s"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
